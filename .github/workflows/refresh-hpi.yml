name: Refresh FHFA HPI data

# FHFA releases quarterly data roughly:
#   Q1 (Jan-Mar) → late May / early June
#   Q2 (Apr-Jun) → late August / September
#   Q3 (Jul-Sep) → late November / December
#   Q4 (Oct-Dec) → late February / March
#
# Running on the 1st of each month catches any release within ~4 weeks.
# The script is a no-op when the data has not changed.
on:
  schedule:
    - cron: '0 6 1 * *'    # 06:00 UTC on the 1st of every month
  workflow_dispatch:         # allow manual trigger from the Actions tab

permissions:
  contents: write            # needed to push the updated hpi.ts

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download and parse FHFA HPI data
        run: node scripts/refresh-hpi.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes — skipping commit."
          else
            git add src/adapters/hpi.ts
            git commit -m "chore: refresh FHFA HPI data ($(date +%Y-%m-%d))"
            git push
            echo "Pushed updated hpi.ts — deploy workflow will rebuild the site."
          fi
